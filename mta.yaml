_schema-version: '3.3'
ID: utility-spareparts
version: 1.0.0
description: Utility spare-parts fulfilment CAP application

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install
        - npx cds build --production
        - npm --prefix app/field-maintenance-ui install
        - npm --prefix app/field-maintenance-ui run build
        - rm -rf app/router/resources/field-maintenance-ui
        - mkdir -p app/router/resources/field-maintenance-ui
        - cp -R app/field-maintenance-ui/dist/. app/router/resources/field-maintenance-ui/

modules:
  - name: utility-spareparts-router
    type: approuter.nodejs
    path: app/router
    parameters:
      memory: 128M
      disk-quota: 256M
    requires:
      - name: utility-spareparts-auth
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true

  - name: utility-spareparts-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: utility-spareparts-db
      - name: utility-spareparts-auth

  - name: utility-spareparts-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    requires:
      - name: utility-spareparts-db

resources:
  - name: utility-spareparts-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: utility-spareparts-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
